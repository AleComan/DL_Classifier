program: train.py
method: bayes          # búsqueda bayesiana, más eficiente que random o grid

metric:
  name: phase2/val_acc
  goal: maximize

parameters:
  model.backbone:
    values:
      - "efficientnet_b0"
      - "efficientnet_b2"
      - "mobilenet_v3_small"

  model.dropout:
    values: [0.2, 0.3, 0.4, 0.5]

  train.lr_phase1:
    values: [0.0005, 0.001, 0.003]

  train.lr_phase2:
    values: [0.00005, 0.0001, 0.0003]

  train.label_smoothing:
    values: [0.0, 0.05, 0.1]

  data.batch_size:
    values: [16, 32]